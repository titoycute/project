<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 p-4 md:p-8">

    <!-- Auth Layer -->
    <div id="auth-container" class="fixed inset-0 bg-gray-950 z-50 flex items-center justify-center p-4">
        <div class="bg-gray-900 p-8 rounded-3xl border border-gray-800 w-full max-w-sm shadow-2xl text-center">
            <h2 class="text-3xl font-black mb-6 text-cyan-400 uppercase tracking-tighter text-white">Manager <span class="text-lime-400 italic">.Log</span></h2>
            <input id="email" type="email" placeholder="Email" class="w-full p-4 mb-4 bg-gray-950 border border-gray-800 rounded-2xl outline-none focus:border-cyan-500 transition">
            <input id="pass" type="password" placeholder="Password" class="w-full p-4 mb-6 bg-gray-950 border border-gray-800 rounded-2xl outline-none focus:border-cyan-500 transition">
            <button id="login-btn" class="w-full bg-cyan-600 hover:bg-cyan-700 py-4 rounded-2xl font-bold transition shadow-lg text-white">SIGN IN</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard" class="max-w-7xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-12 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-white uppercase">System <span class="text-lime-400 italic">Core</span></h1>
                <div class="flex gap-4 mt-3">
                    <a href="index.html" target="_blank" class="bg-lime-400 text-black text-[10px] font-black px-4 py-2 rounded-full hover:bg-white transition flex items-center gap-2">
                        <i class="fa-solid fa-eye"></i> VIEW PUBLIC SITE
                    </a>
                </div>
            </div>
            <button id="logout-btn" class="text-zinc-500 hover:text-red-500 text-xs font-black tracking-widest transition">LOGOUT_SESSION</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <!-- Form Area -->
            <div class="lg:col-span-6">
                <form id="project-form" class="bg-gray-900 p-8 rounded-[2rem] border border-gray-800 shadow-2xl space-y-5">
                    <h2 id="form-title" class="text-xl font-bold mb-4 text-cyan-400">Add New Entry</h2>
                    <input type="hidden" id="edit-id">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <input id="title" placeholder="Title" class="col-span-2 p-4 bg-gray-950 border border-gray-800 rounded-2xl focus:border-cyan-500 outline-none text-sm" required>
                        <input id="link" placeholder="Working URL" class="p-4 bg-gray-950 border border-gray-800 rounded-2xl focus:border-cyan-500 outline-none text-sm" required>
                        <input id="logo" placeholder="Main Logo URL" class="p-4 bg-gray-950 border border-gray-800 rounded-2xl focus:border-cyan-500 outline-none text-sm" required>
                        <input id="tools" placeholder="Stack (React, etc)" class="col-span-2 p-4 bg-gray-950 border border-gray-800 rounded-2xl focus:border-cyan-500 outline-none text-sm">
                    </div>

                    <!-- GALLERY MANAGER -->
                    <div class="p-5 bg-black/40 border border-white/5 rounded-3xl">
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-4 tracking-widest">System Preview Gallery</label>
                        <div id="gallery-preview-list" class="flex flex-wrap gap-2 mb-4">
                            <!-- Visual list of images added -->
                        </div>
                        <div class="flex gap-2">
                            <input id="gal-url" placeholder="Screenshot URL" class="flex-1 p-3 bg-gray-950 border border-gray-800 rounded-xl text-xs outline-none">
                            <input id="gal-cap" placeholder="Caption (Optional)" class="flex-1 p-3 bg-gray-950 border border-gray-800 rounded-xl text-xs outline-none">
                            <button type="button" id="add-gal-btn" class="bg-white text-black w-10 h-10 rounded-xl font-bold">+</button>
                        </div>
                    </div>

                    <!-- SDG Selector -->
                    <div>
                        <label class="block text-[10px] font-black text-gray-500 uppercase mb-3 tracking-widest">UN SDG Impact</label>
                        <div id="selected-sdgs-pills" class="flex flex-wrap gap-2 mb-4 min-h-[40px] p-3 bg-gray-950 border border-gray-800 rounded-2xl items-center"></div>
                        <div class="flex gap-2">
                            <select id="sdg-dropdown" class="flex-1 p-3 bg-gray-950 border border-gray-800 rounded-xl text-sm outline-none focus:border-cyan-500 cursor-pointer text-gray-400">
                                <option value="" disabled selected>Select Goal...</option>
                            </select>
                            <button type="button" id="add-sdg-btn" class="bg-cyan-600 text-white w-10 h-10 rounded-xl font-bold">+</button>
                        </div>
                    </div>

                    <textarea id="desc" placeholder="Markdown supported..." rows="4" class="w-full p-4 bg-gray-950 border border-gray-800 rounded-2xl focus:border-cyan-500 outline-none text-sm" required></textarea>
                    
                    <div class="flex gap-4">
                        <button type="submit" class="flex-1 bg-lime-400 text-black py-4 rounded-2xl font-black transition hover:bg-white uppercase tracking-tighter">Save Project Data</button>
                        <button type="button" id="cancel-edit" class="hidden bg-gray-800 px-6 rounded-2xl transition text-xs font-bold uppercase">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- List Area -->
            <div class="lg:col-span-6 space-y-4">
                <h3 class="text-sm font-black text-gray-500 tracking-widest uppercase">Existing Records</h3>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db, auth } from './config.js';
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const sdgsList = ["No Poverty", "Zero Hunger", "Good Health", "Quality Education", "Gender Equality", "Clean Water", "Affordable Energy", "Decent Work", "Industry & Innovation", "Reduced Inequalities", "Sustainable Cities", "Responsible Consumption", "Climate Action", "Life Below Water", "Life On Land", "Peace & Justice", "Partnerships"];
        let selectedSdgs = [];
        let projectGallery = []; // [{url, caption}]

        const getLocalIcon = (n) => `./E SDG Icons WEB/E-WEB-Goal-${n.toString().padStart(2, '0')}.png`;

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try { await signInWithEmailAndPassword(auth, e, p); } catch (err) { alert(err.message); }
        };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initDashboard();
            } else {
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('dashboard').classList.add('hidden');
            }
        });

        function initDashboard() {
            const dropdown = document.getElementById('sdg-dropdown');
            const addSdgBtn = document.getElementById('add-sdg-btn');
            const pillBox = document.getElementById('selected-sdgs-pills');
            const galBtn = document.getElementById('add-gal-btn');
            const galList = document.getElementById('gallery-preview-list');

            // --- SDG UI ---
            if(dropdown.options.length <= 1) {
                sdgsList.forEach((name, i) => {
                    const opt = document.createElement('option');
                    opt.value = i + 1; opt.innerText = `Goal ${i+1}: ${name}`;
                    dropdown.appendChild(opt);
                });
            }

            const renderSdgPills = () => {
                pillBox.innerHTML = selectedSdgs.map(num => `
                    <div class="flex items-center gap-2 bg-gray-900 border border-gray-800 pl-1 pr-3 py-1 rounded-full">
                        <img src="${getLocalIcon(num)}" class="w-5 h-5 rounded-full bg-white p-0.5 object-contain">
                        <button type="button" onclick="removeSdgTag(${num})" class="text-red-500 text-xs"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                `).join('');
            };

            window.removeSdgTag = (num) => { selectedSdgs = selectedSdgs.filter(n => n != num); renderSdgPills(); };
            addSdgBtn.onclick = () => {
                if(!dropdown.value || selectedSdgs.includes(dropdown.value)) return;
                selectedSdgs.push(dropdown.value); renderSdgPills(); dropdown.value = "";
            };

            // --- GALLERY UI ---
            const renderGallery = () => {
                galList.innerHTML = projectGallery.map((img, i) => `
                    <div class="relative group w-16 h-16 border border-white/10 rounded-lg overflow-hidden">
                        <img src="${img.url}" class="w-full h-full object-cover">
                        <button type="button" onclick="removeGalItem(${i})" class="absolute inset-0 bg-red-600/80 opacity-0 group-hover:opacity-100 transition flex items-center justify-center text-xs"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `).join('');
            };

            window.removeGalItem = (index) => { projectGallery.splice(index, 1); renderGallery(); };
            galBtn.onclick = () => {
                const url = document.getElementById('gal-url').value;
                const cap = document.getElementById('gal-cap').value;
                if(!url) return;
                projectGallery.push({url, caption: cap});
                renderGallery();
                document.getElementById('gal-url').value = "";
                document.getElementById('gal-cap').value = "";
            };

            // --- SAVE ---
            document.getElementById('project-form').onsubmit = async (e) => {
                e.preventDefault();
                const id = document.getElementById('edit-id').value;
                const data = {
                    title: document.getElementById('title').value,
                    link: document.getElementById('link').value,
                    logo: document.getElementById('logo').value,
                    tools: document.getElementById('tools').value,
                    description: document.getElementById('desc').value,
                    sdgs: selectedSdgs,
                    gallery: projectGallery
                };
                try {
                    id ? await updateDoc(doc(db, "projects", id), data) : await addDoc(collection(db, "projects"), data);
                    resetForm();
                } catch (err) { alert(err.message); }
            };

            // --- LIST ---
            onSnapshot(collection(db, "projects"), (snap) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                snap.forEach(docSnap => {
                    const item = docSnap.data();
                    const div = document.createElement('div');
                    div.className = "bg-gray-900 p-6 rounded-[2rem] border border-gray-800 flex justify-between items-center";
                    div.innerHTML = `
                        <div class="flex items-center gap-5">
                            <img src="${item.logo}" class="w-12 h-12 object-cover rounded-xl border border-gray-800">
                            <div><h4 class="font-bold text-white">${item.title}</h4></div>
                        </div>
                        <div class="flex gap-4">
                            <button class="edit-btn text-lime-400 font-bold text-xs uppercase">Edit</button>
                            <button class="del-btn text-red-500 font-bold text-xs uppercase">Del</button>
                        </div>`;
                    div.querySelector('.del-btn').onclick = () => confirm("Delete?") && deleteDoc(doc(db, "projects", docSnap.id));
                    div.querySelector('.edit-btn').onclick = () => {
                        window.scrollTo({top: 0, behavior: 'smooth'});
                        document.getElementById('edit-id').value = docSnap.id;
                        document.getElementById('title').value = item.title;
                        document.getElementById('link').value = item.link;
                        document.getElementById('logo').value = item.logo;
                        document.getElementById('tools').value = item.tools;
                        document.getElementById('desc').value = item.description;
                        selectedSdgs = item.sdgs || [];
                        projectGallery = item.gallery || [];
                        renderSdgPills(); renderGallery();
                        document.getElementById('form-title').innerText = "Update Entry";
                        document.getElementById('cancel-edit').classList.remove('hidden');
                    };
                    list.appendChild(div);
                });
            });
        }

        function resetForm() {
            document.getElementById('project-form').reset();
            selectedSdgs = []; projectGallery = [];
            document.getElementById('selected-sdgs-pills').innerHTML = '';
            document.getElementById('gallery-preview-list').innerHTML = '';
            document.getElementById('edit-id').value = '';
            document.getElementById('form-title').innerText = "Add Project";
            document.getElementById('cancel-edit').classList.add('hidden');
        }
        document.getElementById('cancel-edit').onclick = resetForm;
    </script>
</body>
</html>
