<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen p-6">

    <div class="bg-gray-900 p-8 rounded-2xl border border-gray-800 w-full max-w-sm shadow-2xl">
        <h2 class="text-3xl font-bold mb-2 text-center text-cyan-400">Register Admin</h2>
        <p class="text-gray-500 text-sm text-center mb-8">Create your portfolio manager account</p>
        
        <form id="reg-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Email Address</label>
                <input id="reg-email" type="email" placeholder="admin@example.com" 
                    class="w-full p-3 bg-gray-950 border border-gray-800 rounded-lg focus:border-cyan-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Password</label>
                <input id="reg-pass" type="password" placeholder="••••••••" 
                    class="w-full p-3 bg-gray-950 border border-gray-800 rounded-lg focus:border-cyan-500 outline-none transition" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Confirm Password</label>
                <input id="reg-confirm" type="password" placeholder="••••••••" 
                    class="w-full p-3 bg-gray-950 border border-gray-800 rounded-lg focus:border-cyan-500 outline-none transition" required>
            </div>

            <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-700 py-3 rounded-lg font-bold shadow-lg shadow-cyan-900/20 transition-all">
                Create Account
            </button>
        </form>

        <p id="msg" class="mt-4 text-center text-sm hidden"></p>

        <div class="mt-6 pt-6 border-t border-gray-800 text-center">
            <a href="admin.html" class="text-gray-400 hover:text-white text-sm">Back to Login</a>
        </div>
    </div>

    <script type="module">
        import { auth } from './config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const form = document.getElementById('reg-form');
        const msg = document.getElementById('msg');

        form.onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;
            const confirm = document.getElementById('reg-confirm').value;

            // Simple validation
            if (pass !== confirm) {
                showMsg("Passwords do not match", "text-red-400");
                return;
            }

            if (pass.length < 6) {
                showMsg("Password must be at least 6 characters", "text-red-400");
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                showMsg("Account created! Redirecting...", "text-emerald-400");
                setTimeout(() => window.location.href = 'admin.html', 2000);
            } catch (error) {
                showMsg(error.message, "text-red-400");
            }
        };

        function showMsg(text, colorClass) {
            msg.innerText = text;
            msg.className = `mt-4 text-center text-sm ${colorClass}`;
            msg.classList.remove('hidden');
        }
    </script>
</body>
</html>
