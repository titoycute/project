<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Tootzkie Custodio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { font-family: 'Space Grotesk', sans-serif; background-color: #18181b; }
        .modal-active { overflow: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); }
        .glass-card:hover { border-color: rgba(163, 230, 53, 0.5); transform: translateY(-8px); background: rgba(163, 230, 53, 0.03); }
        .glow-lime { text-shadow: 0 0 20px rgba(163, 230, 53, 0.5); }
        .portrait-halo { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120%; height: 120%; background: radial-gradient(circle, rgba(163, 230, 53, 0.15) 0%, transparent 70%); z-index: -1; filter: blur(40px); animation: pulse-halo 6s infinite; }
        @keyframes pulse-halo { 0%, 100% { opacity: 0.4; scale: 1; } 50% { opacity: 0.8; scale: 1.1; } }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #bef264; border-radius: 10px; }
        #modal-desc strong { color: white; font-weight: 700; }
        #modal-desc em { color: #bef264; font-style: italic; }
        
        /* Lightbox Fade In */
        .lightbox-enter { opacity: 0; transform: scale(0.9); transition: all 0.3s ease-out; }
        .lightbox-show { opacity: 1; transform: scale(1); }
    </style>
</head>
<body class="text-white selection:bg-lime-400 selection:text-black">

    <!-- Secret Shortcut Triggers -->
    <div onclick="window.location.href='admin.html'" class="fixed top-0 left-0 w-12 h-12 z-[100] cursor-default"></div>
    <div onclick="window.location.href='admin.html'" class="fixed top-0 right-0 w-12 h-12 z-[100] cursor-default"></div>

    <div class="max-w-[1600px] mx-auto min-h-screen lg:flex">
        <!-- LEFT SIDE: Portrait -->
        <aside class="lg:w-1/3 p-10 lg:p-20 flex flex-col justify-center items-center lg:items-start lg:sticky lg:top-0 lg:h-screen">
            <div class="relative w-64 h-64 md:w-80 md:h-80 mb-10 group">
                <div class="portrait-halo"></div>
                <img src="m2.png" alt="Portrait" class="w-full h-full object-contain relative z-10 filter drop-shadow-[0_0_15px_rgba(163,230,53,0.3)]" onerror="this.src='https://via.placeholder.com/400?text=Portrait'">
            </div>
            <div class="text-center lg:text-left">
                <h1 class="text-5xl lg:text-7xl font-black uppercase leading-none mb-4">Creative <br> <span class="text-lime-400 glow-lime italic">Tootzkie</span></h1>
                <p class="text-zinc-500 tracking-[0.3em] uppercase text-xs font-bold mb-8">Transforming Ideas into Reality</p>
            </div>
        </aside>

        <!-- RIGHT SIDE: Projects -->
        <main class="lg:w-2/3 p-6 lg:p-20">
            <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </main>
    </div>

    <!-- MAIN PROJECT MODAL -->
    <div id="project-modal" class="fixed inset-0 z-40 hidden flex items-center justify-center p-4">
        <div id="modal-backdrop" class="absolute inset-0 bg-zinc-950/95 backdrop-blur-2xl"></div>
        <div class="relative bg-zinc-900 border border-white/10 w-full max-w-6xl max-h-[92vh] overflow-hidden rounded-[3rem] shadow-2xl flex flex-col md:flex-row transform transition-all duration-300 scale-95 opacity-0" id="modal-container">
            <button id="close-modal" class="absolute top-6 right-6 z-20 bg-lime-400 text-black w-10 h-10 rounded-full flex items-center justify-center transition-all hover:rotate-90"><i class="fa-solid fa-xmark"></i></button>
            <div class="md:w-5/12 h-48 md:h-auto bg-black"><img id="modal-img" src="" class="w-full h-full object-cover"></div>
            <div class="md:w-7/12 p-8 md:p-14 overflow-y-auto custom-scroll">
                <div id="modal-tools" class="flex flex-wrap gap-2 mb-6"></div>
                <h2 id="modal-title" class="text-4xl md:text-5xl font-black mb-6 text-white uppercase tracking-tighter"></h2>
                <div id="modal-desc" class="text-zinc-400 leading-relaxed mb-10 text-lg font-light prose prose-invert"></div>

                <!-- SYSTEM PREVIEW (LANDSCAPE GRID) -->
                <div id="modal-gallery-section" class="mb-12 hidden">
                    <h4 class="text-[10px] font-black text-white/40 uppercase tracking-[0.3em] mb-4">System Previews (Click to expand)</h4>
                    <div id="modal-gallery" class="grid grid-cols-2 sm:grid-cols-3 gap-3">
                        <!-- Thumbnails injected here -->
                    </div>
                </div>

                <div class="mb-12 p-8 bg-black/30 rounded-[2rem] border border-white/5 flex flex-wrap gap-4 items-center">
                    <div class="flex-1"><h4 class="text-[10px] font-black text-lime-400 uppercase tracking-[0.3em] mb-4">Sustainability Impact</h4><div id="modal-sdgs" class="flex flex-wrap gap-3"></div></div>
                </div>

                <a id="modal-link" href="#" target="_blank" class="flex items-center justify-center gap-4 bg-white text-black px-12 py-5 rounded-2xl font-black transition-all hover:bg-lime-400 uppercase tracking-widest">Visit Site</a>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX MODAL (For Full Screenshot Preview) -->
    <div id="lightbox" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 md:p-12">
        <div id="lightbox-backdrop" class="absolute inset-0 bg-black/98 backdrop-blur-md"></div>
        <div id="lightbox-content" class="relative max-w-5xl w-full flex flex-col items-center lightbox-enter">
            <button id="close-lightbox" class="absolute -top-12 right-0 text-white hover:text-lime-400 text-2xl transition"><i class="fa-solid fa-circle-xmark"></i> Close Preview</button>
            <img id="lightbox-img" src="" class="w-full rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)] border border-white/10 aspect-video object-cover">
            <div class="mt-6 text-center">
                <p id="lightbox-caption" class="text-lime-400 font-bold text-lg tracking-tight uppercase"></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from './config.js';
        import { collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const grid = document.getElementById('projects-grid');
        const modal = document.getElementById('project-modal');
        const modalCont = document.getElementById('modal-container');
        const lightbox = document.getElementById('lightbox');
        const lbCont = document.getElementById('lightbox-content');

        // Secret Shortcut
        let pressedKeys = {};
        window.onkeydown = (e) => {
            pressedKeys[e.key.toLowerCase()] = true;
            if (pressedKeys['shift'] && pressedKeys['a'] && pressedKeys['s']) window.location.href = 'admin.html';
        };
        window.onkeyup = (e) => pressedKeys[e.key.toLowerCase()] = false;

        // LIGHTBOX LOGIC
        window.openLightbox = (url, caption) => {
            document.getElementById('lightbox-img').src = url;
            document.getElementById('lightbox-caption').innerText = caption || 'System Preview';
            lightbox.classList.remove('hidden');
            setTimeout(() => lbCont.classList.add('lightbox-show'), 10);
        };

        const closeLightbox = () => {
            lbCont.classList.remove('lightbox-show');
            setTimeout(() => lightbox.classList.add('hidden'), 300);
        };
        document.getElementById('close-lightbox').onclick = closeLightbox;
        document.getElementById('lightbox-backdrop').onclick = closeLightbox;

        // PROJECT MODAL LOGIC
        window.openProject = (data) => {
            document.getElementById('modal-title').innerText = data.title;
            document.getElementById('modal-desc').innerHTML = marked.parse(data.description);
            document.getElementById('modal-img').src = data.logo;

            let finalUrl = (data.link || '').trim();
            if (finalUrl && !/^https?:\/\//i.test(finalUrl)) finalUrl = 'https://' + finalUrl;
            document.getElementById('modal-link').href = finalUrl;
            
            document.getElementById('modal-tools').innerHTML = (data.tools || '').split(',').map(t => 
                `<span class="px-4 py-1.5 text-[10px] font-bold uppercase bg-white/5 text-white rounded-full border border-white/10">${t.trim()}</span>`
            ).join('');

            // Gallery Thumbnails (Landscape grid)
            const galSec = document.getElementById('modal-gallery-section');
            const galBox = document.getElementById('modal-gallery');
            if(data.gallery && data.gallery.length > 0) {
                galSec.classList.remove('hidden');
                galBox.innerHTML = data.gallery.map(img => `
                    <div class="aspect-video bg-black rounded-lg overflow-hidden border border-white/5 hover:border-lime-400 transition cursor-pointer group relative" 
                         onclick="openLightbox('${img.url}', '${img.caption?.replace(/'/g, "\\'")}')">
                        <img src="${img.url}" class="w-full h-full object-cover opacity-60 group-hover:opacity-100 transition">
                        <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                            <i class="fa-solid fa-expand text-white text-xl drop-shadow-lg"></i>
                        </div>
                    </div>
                `).join('');
            } else { galSec.classList.add('hidden'); }

            const sContainer = document.getElementById('modal-sdgs');
            const getSdgUrl = (n) => `./E SDG Icons WEB/E-WEB-Goal-${n.toString().padStart(2, '0')}.png`;
            sContainer.innerHTML = (data.sdgs || []).map(num => `<img src="${getSdgUrl(num)}" class="w-12 h-12 rounded-xl bg-white p-1">`).join('');

            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
            setTimeout(() => modalCont.classList.remove('scale-95', 'opacity-0'), 10);
        };

        document.getElementById('close-modal').onclick = () => {
            modalCont.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); document.body.classList.remove('modal-active'); }, 200);
        };

        onSnapshot(query(collection(db, "projects")), (snapshot) => {
            grid.innerHTML = '';
            snapshot.forEach((doc) => {
                const p = doc.data();
                const card = document.createElement('div');
                card.className = "group glass-card rounded-[2.5rem] overflow-hidden cursor-pointer";
                card.onclick = () => openProject(p);
                card.innerHTML = `
                    <div class="h-64 overflow-hidden relative"><img src="${p.logo}" class="w-full h-full object-cover grayscale opacity-30 group-hover:grayscale-0 group-hover:opacity-100 transition-all duration-700"></div>
                    <div class="p-8"><h3 class="text-2xl font-black mb-3 text-white group-hover:text-lime-400 transition tracking-tighter uppercase">${p.title}</h3><p class="text-zinc-500 text-xs line-clamp-2 leading-relaxed">${p.description}</p></div>`;
                grid.appendChild(card);
            });
        });
    </script>
</body>

</html>
